<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HAERMS - Command Center Staff Login">
    <title>HAERMS — Command Center Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1c2e 0%, #0f101a 100%);
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        .input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .staff-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .staff-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 0.6rem;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .staff-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .staff-btn.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }

        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
        }

        .footer-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #3b82f6;
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-box">🚨</div>
                <h1>HAERMS</h1>
                <p>Command Center Staff Login</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">✉️ Staff Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="name@haerms.gov" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">🔒 Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Sign In to Portal
                </button>
            </form>

            <div class="staff-options">
                <button class="staff-btn" onclick="fillDemo('police1@demo.com')">🚔 Police Dept</button>
                <button class="staff-btn" onclick="fillDemo('ambulance1@demo.com')">🚑 Ambulance</button>
                <button class="staff-btn" onclick="fillDemo('hospital@demo.com')">🏥 Hospital</button>
                <button class="staff-btn" onclick="fillDemo('admin@demo.com')">🎯 Administrator</button>
            </div>

            <div class="footer-links">
                <a href="/">← Return to Citizen Portal</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Check if already logged in staff
        const user = getUser();
        if (user && user.role !== 'CITIZEN' && getToken()) {
            redirectByRole(user.role);
        }

        function fillDemo(email) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = '1234';
            document.getElementById('loginBtn').click();
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Authenticating...';

            try {
                const data = await apiRequest('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                if (data.user.role === 'CITIZEN') {
                    throw new Error('Access Denied: Use the Citizen Portal for reporter access.');
                }

                saveAuth(data.token, data.user);
                showToast('Welcome back, ' + data.user.name, 'success');

                setTimeout(() => {
                    redirectByRole(data.user.role);
                }, 800);

            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Sign In to Portal';
            }
        });
    </script>
</body>

</html>
